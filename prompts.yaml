# HARDWARE-SPECIFIC PROMPTS
# ============================================

hardware_series_extraction:
  description: "Extract series from hardware product pricebooks (hinges, locks, closers, exit devices, etc.)"
  prompt: |
    You are an expert AI agent specialized in analyzing HARDWARE product catalogues and pricebooks.
    Hardware includes: hinges, locks, locksets, door closers, exit devices, panic hardware, thresholds, weatherstripping, kick plates, push/pull bars, astragals, coordinators, and similar door/frame hardware.

    TASK: Analyze the provided PDF document and extract ALL hardware product series/lines.

    IMPORTANT RULES:
    1. Scan the ENTIRE document - series information may be scattered across non-contiguous pages
    2. Each distinct hardware product line or model family should be its own series
    3. Group related models under the same series (e.g., all variants of a continuous hinge line)
    4. Do NOT lump unrelated hardware types into one series
    5. Focus on extracting SERIES and PAGES ONLY - summaries will be extracted separately
    6. If a series spans multiple pages, capture ALL page numbers
    7. Ensure ALL JSON strings are properly closed with quotes

    EXCLUDE THE FOLLOWING — these are NOT series:
    - Parts pages (replacement parts, spare parts, components lists)
    - Accessories pages that are not a distinct product line
    - Optional add-ons, upgrades, or optional features sections
    - Price adders, surcharges, or adjustment tables
    - Finish/color option pages that are not tied to a specific product line
    - General terms, conditions, warranty, or index pages
    - Freight, shipping, or packaging information
    If a page only contains parts, accessories, or options for an existing series, do NOT create a new series for it — those details belong to the parent series.

    NOTE: Do NOT spend time on summaries - set SUMMARY to empty string.

    {additional_rules}

    CRITICAL: Return ONLY valid, well-formed JSON. Every string must be properly quoted and closed.

    [
        {{
            "SERIES": "Exact series/product line name as shown in document",
            "PAGES": [1, 2, 3],
            "SUMMARY": ""
        }}
    ]

hardware_series_categorization:
  description: "Categorize a hardware series into sub-categories"
  prompt: |
    You are an expert at categorizing hardware products into specific sub-categories.

    TASK: Analyze the following hardware series and assign it a specific hardware sub-category.

    SERIES INFORMATION:
    - Name: {series_name}
    - Summary: {series_summary}
    - Pages in PDF: {series_pages}

    You have access to the ORIGINAL PDF document to verify the categorization.

    HARDWARE SUB-CATEGORIES:

    HINGES - Products that are hinges:
    - Continuous hinges (geared, pin & barrel)
    - Butt hinges (full mortise, half mortise, half surface, full surface)
    - Pivot hinges (offset, center, intermediate)
    - Spring hinges (single-acting, double-acting)
    - Specialty hinges (hospital tip, security, raised barrel)

    LOCKS - Products that are locks or locksets:
    - Mortise locks and locksets
    - Cylindrical locks and locksets
    - Deadbolts and deadlatches
    - Electronic/smart locks
    - Multipoint locks
    - Padlocks and cabinet locks

    CLOSERS - Products that are door closers:
    - Surface closers (regular arm, parallel arm, top jamb)
    - Concealed closers (overhead, floor)
    - Spring closers
    - Electromagnetic hold-open closers

    EXIT_DEVICES - Panic and exit hardware:
    - Rim exit devices
    - Mortise exit devices
    - Surface vertical rod
    - Concealed vertical rod
    - Alarmed exit devices

    THRESHOLDS - Threshold and seal products:
    - Saddle thresholds
    - Thermal break thresholds
    - ADA compliant thresholds
    - Weatherstripping and door bottoms

    ACCESSORIES - Other door hardware accessories:
    - Kick plates, push plates, pull bars
    - Door stops and holders
    - Flush bolts and dust proof strikes
    - Astragals and coordinators
    - Protection plates
    - Viewers and knockers

    ANALYSIS STEPS:
    1. Review the series name for hardware type indicators
    2. Review the summary for product details
    3. Check the PDF pages for actual product specifications
    4. Look at pricing structure and model numbers
    5. Determine the most specific sub-category
    6. Assign the appropriate raw material code from the list below

    AVAILABLE RAW MATERIAL CODES:
    {raw_materials}

    RAW MATERIAL ASSIGNMENT RULES:
    - For all hardware series, the default raw material code is HWD (Hardware)
    - If the series is clearly about a specific material type (e.g., stainless steel hardware), still use HWD

    {additional_rules}

    Return ONLY valid JSON in exactly this format (no markdown, no extra text):
    {{"CATEGORY": "HARDWARE", "SUB_CATEGORY": "HINGES", "RAW_MATERIAL_CODE": "HWD", "CONFIDENCE": 0.95, "REASONING": "explanation here"}}

hardware_series_categorization_verification:
  description: "Verify hardware categorization result"
  prompt: |
    You are verifying the categorization of a hardware series.

    SERIES: {series_name}
    PAGES: {series_pages}
    ASSIGNED CATEGORY: {assigned_category}
    ASSIGNED SUB_CATEGORY: {assigned_sub_category}
    CONFIDENCE: {confidence}

    TASK: Verify this categorization by checking the actual PDF content.

    CHECK:
    1. Does the PDF content match the assigned sub-category?
    2. Is the confidence justified?
    3. Would a different sub-category be more accurate?

    Return JSON:
    {{
        "is_correct": true,
        "confidence": 0.95,
        "suggested_category": "HARDWARE",
        "suggested_sub_category": "HINGES",
        "feedback": "Brief feedback if incorrect"
    }}

hardware_summary_extraction:
  description: "Extract detailed summary for a hardware series"
  prompt: |
    You are an expert at analyzing hardware product pricebooks.

    TASK: Create an EXTREMELY DETAILED and COMPREHENSIVE summary for the "{series_name}" hardware series.
    This is a {category} / {sub_category} series. The PDF contains ONLY the relevant pages.

    SERIES INFORMATION:
    - Series Name: {series_name}
    - Category: {category}
    - Sub-Category: {sub_category}
    - Pages: {series_pages}

    {additional_context}

    CRITICAL: CAPTURE EVERY DETAIL - NO INFORMATION SHOULD BE LEFT OUT!

    SUMMARY REQUIREMENTS (1500-2000 characters):

    1. PRODUCT IDENTITY:
       - Exact hardware type and full name/designation
       - Mechanism type and operation (spring-loaded, hydraulic, mechanical, electric)
       - Full model/part number structure and naming convention
       - Product line or family name

    2. MATERIALS & FINISHES:
       - ALL material options (steel, stainless, brass, bronze, aluminum)
       - Material grades (e.g., "304 stainless", "commercial bronze")
       - ALL finish options: ANSI/BHMA codes and color names
       - Special coatings (PVD, powder coat, plated)

    3. RATINGS & CERTIFICATIONS:
       - Fire rating with test standards
       - BHMA grade (Grade 1, 2, 3) with cycle testing
       - ADA/accessibility compliance
       - Security ratings, environmental exposure ratings
       - Testing standards met (ANSI A156.X, UL, etc.)

    4. CAPACITY & SIZING:
       - Door weight capacity: min and max
       - Door width capacity: min and max
       - Door thickness compatibility
       - Spring sizes, arm lengths, backsets

    5. FUNCTIONS & CONFIGURATIONS:
       - ALL available functions (passage, privacy, storeroom, classroom, etc.)
       - Hand/handing requirements and reversibility
       - Operating modes, trim styles, cylinder types
       - Electric options (fail-safe, fail-secure, monitoring)

    6. BASE PRICE STRUCTURE:
       - What determines base price (model, function, finish)
       - Price variations by finish, function, or grade
       - Quantity pricing breakpoints

    7. OPTIONS & ACCESSORIES:
       - Cylinder options, trim options, electrical accessories
       - Mounting hardware, cover plates, dogging options
       - Delayed egress, card reader integration

    8. PRICING DETAILS:
       - Upcharges for premium finishes
       - Electric option pricing, cylinder pricing, trim pricing

    9. TECHNICAL REQUIREMENTS:
       - Installation clearances, power requirements, wiring
       - Field modifications allowed/prohibited

    10. AVAILABILITY:
        - Lead times, stock vs special order
        - Minimum order quantities

    Return ONLY valid JSON:
    {{"summary": "Your extremely detailed summary here..."}}

hardware_summary_verification:
  description: "Verify hardware summary extraction"
  prompt: |
    You are verifying the summary extraction for a hardware series.

    SERIES: {series_name}
    PAGES: {series_pages}
    SUB-CATEGORY: {sub_category}

    EXTRACTED SUMMARY:
    {extracted_summary}

    TASK: Verify the summary against the PDF content.

    CHECK:
    1. Are all product details captured?
    2. Are model numbers and specifications correct?
    3. Are finish options and pricing details complete?
    4. Any missing critical hardware information?

    IMPORTANT: Keep your response SHORT and CONCISE. Do NOT repeat the summary content. Only return the JSON object below — nothing else.

    Return ONLY this JSON (no extra text):
    {{
        "is_complete": true,
        "confidence": 0.9,
        "issues_count": 0,
        "issues": ["issue1"],
        "feedback": "One sentence max"
    }}

hardware_parameter_extraction:
  description: "Extract configuration parameters from hardware series base price table"
  prompt: |
    You are an expert in commercial door hardware — closers, locksets, exit devices, hinges, pivots, electromagnetic holders, and access control. You understand how hardware pricebooks are structured: price tables organized by model/part number, function, finish, and size, where each selection axis directly determines the price.

    TASK: Analyze the "{series_name}" hardware series to extract ONLY the MINIMUM parameters required to look up a single cell in the BASE PRICE TABLE.

    SERIES INFORMATION:
    - Series Name: {series_name}
    - Pages included in PDF: {series_pages}
    - Summary: {series_summary}

    {additional_context}

    EXTRACTION RULES:

    1. BASE PRICE TABLE IDENTIFICATION:
       - Find the SPECIFIC base price table for "{series_name}"
       - For HARDWARE: Look for price tables organized by model, function, finish, or size
       - IGNORE tables for other series

    2. EXTRACT EXACT VALUES:
       - Model/Part Number: Extract available model numbers
       - Function: Lock functions (passage, privacy, classroom, storeroom, etc.), closer types (regular arm, parallel arm, top jamb), hinge types (full mortise, half mortise, swing clear)
       - Finish: Available finishes (US26D, 630, 652, US3, etc.) — different finishes often have different prices
       - Size/Capacity: Door weight ratings, hinge sizes (4.5"x4.5", 5"x5"), closer sizes (1-6)
       - Hand/Handing: LH, RH, LHR, RHR if applicable and priced differently
       - Grade: BHMA grade if applicable and affects pricing

       DO NOT:
       - Assume standard values that aren't shown
       - Mix values from different tables
       - Add options not in THIS series' table

       INCLUDE — ONLY parameters that are axes or groupings of the base price table:
       - Row headers of the price table (e.g., Model/Part Number)
       - Column headers of the price table (e.g., Finish)
       - Table grouping/splitting parameters (e.g., Function, Size) — these create separate sub-tables
       - In short: the minimum set of selections needed to pinpoint ONE price cell in the base table

       EXCLUDE — everything else goes to optional parameters:
       - Upcharges, adders, and surcharges (even if near the base table)
       - Accessories, add-ons, and modifications
       - Any parameter NOT required to locate a base price cell

       For parameters with >10 options: include first 5 representative values only.

    3. PARAMETER HIERARCHY:
       - Break combined parameters into parent/child where appropriate
       - As a domain expert, note dependencies (e.g., certain functions only available on specific models, certain finishes only on specific trim styles)

    4. FIELD USAGE:
       - "description": Use domain-relevant descriptions when hardware jargon needs clarification (e.g., "BHMA Grade 1 heavy-duty commercial" for Grade). Use null for self-explanatory names like Finish, Model.
       - "notes": Capture pricing impacts, dependencies, or construction constraints (e.g., "+$15 over standard", "only with 4040XP model", "determines price tier"). Use null when there is no pricing note or constraint.
       - "is_numeric": TRUE only for dimensional/size parameters where user enters custom value
       - Keep responses concise

    JSON FORMATTING - CRITICAL:
    - ALL strings in double quotes
    - NO trailing commas
    - Return ONLY valid JSON array

    OUTPUT FORMAT:

    [
        {{
            "parameter_name": "Model",
            "description": null,
            "parent_parameter": null,
            "is_numeric": false,
            "options": [
                {{"option_name": "4040XP", "notes": null}},
                {{"option_name": "4041", "notes": null}}
            ]
        }},
        {{
            "parameter_name": "Function",
            "description": null,
            "parent_parameter": null,
            "is_numeric": false,
            "options": [
                {{"option_name": "Regular Arm", "notes": null}},
                {{"option_name": "Parallel Arm", "notes": "+$15"}}
            ]
        }}
    ]

hardware_parameter_verification:
  description: "Verify extracted hardware parameters"
  prompt: |
    You are verifying parameter extraction for the "{series_name}" hardware series.

    SERIES PAGES: {series_pages}

    EXTRACTED PARAMETERS:
    {extracted_parameters}

    TASK: Verify extracted parameters against the base price table for "{series_name}".

    CHECK FOR:
    1. Missing key parameters (model, function, finish, size)
    2. Incorrect options that don't match the table
    3. Parameters needing parent/child hierarchy
    4. Values from other series mixed in

    KEEP RESPONSE SHORT:
    - Max 3 issues
    - Brief descriptions (50 chars max)

    Return JSON:
    {{
        "is_complete": true,
        "issues_count": 0,
        "issues": [{{"type": "missing_parameter", "description": "Brief"}}],
        "missing_parameters": ["Param1"]
    }}

hardware_parameter_refinement:
  description: "Refine hardware parameters based on verification feedback"
  prompt: |
    You are refining parameter extraction for the "{series_name}" hardware series based on feedback.

    SERIES PAGES: {series_pages}

    CURRENT PARAMETERS:
    {current_parameters}

    VERIFICATION FEEDBACK:
    {feedback}

    TASK: Refine parameters based on feedback:
    - Add missing parameters from the base price table
    - Fix hierarchy issues
    - Correct options to match EXACT values in the table
    - Remove options from other series

    MINIMIZE TOKEN USAGE:
    - "description": null unless explanation needed
    - "notes": null unless pricing/restriction info
    - Most values should be null

    Return ONLY valid JSON array of parameters.

hardware_optional_parameter_extraction:
  description: "Extract optional/add-on parameters from hardware series"
  prompt: |
    You are an expert in commercial door hardware — closers, locksets, exit devices, hinges, pivots, electromagnetic holders, and access control. You understand the full range of optional accessories, upgrades, and modifications available for each hardware category, and you know which ones carry pricing in a pricebook. Your job is to capture EVERY option that has a price attached to it.

    TASK: Extract ALL OPTIONAL parameters, accessories, and add-ons for "{series_name}" that have associated PRICING and are NOT part of the base price.

    SERIES INFORMATION:
    - Series Name: {series_name}
    - Pages: {series_pages}
    - Summary: {series_summary}
    - Category: {category}

    {additional_context}

    ALREADY EXTRACTED BASE PARAMETERS (DO NOT INCLUDE THESE):
    {base_parameter_names}
    These parameters are already captured as base price table axes/groupings. Do NOT duplicate them in optional parameters.
    However, if a base parameter has UPCHARGE options (e.g., premium finish add $25), those upcharges SHOULD be captured here.

    EXTRACTION RULES:

    1. PRICE-DRIVEN EXTRACTION — CRITICAL PRINCIPLE:
       - ONLY extract parameters/options that have pricing shown in the PDF ("+$X", "add $X", price column, price table)
       - If an item appears in the PDF with NO associated price, SKIP it
       - Every option you extract should have a price note or be part of a priced group

    2. OPTIONAL ITEMS IDENTIFICATION:
       Look for: "Options", "Accessories", "Add-ons", "Upgrades", "Adders", "+$X" pricing

    3. WHAT TO EXTRACT FOR HARDWARE (domain knowledge — common priced add-ons):
       - Cylinder options and keying (SFIC, FSIC, Schlage, Corbin Russwin, Medeco — keyway type affects price)
       - Trim styles and upgrades (lever designs: Augusta, Omega, Rhodes — premium trim costs more)
       - Finish upgrades (premium PVD finishes, antimicrobial coatings, custom colors)
       - Electrical options (EL, ELR, LX, fail-safe, fail-secure, request-to-exit)
       - Mounting kits and brackets (soffit plates, drop brackets, parallel arm shoes)
       - Cover plates and filler plates
       - Dogging options (hex key, cylinder dogging, mechanical dogging)
       - Delayed egress modules (code-compliant delayed exit)
       - Card reader integration and access control prep
       - Extended warranties
       - Special backsets or functions (2-3/4" vs 2-3/8" backset adder)
       - Door position indicators / switches
       - Signal switches and monitoring (door ajar alarm, forced entry)
       - Rain/weather covers (for surface-mounted closers)
       - Through-bolt kits
       - Hold-open arms / spring stop options

    4. EXTRACT EXACT VALUES WITH PRICING:
       - Get EXACT option names from PDF
       - ALWAYS include pricing in notes ("+$25", "add $50/unit")
       - Capture compatibility and dependency requirements (e.g., "requires Model 4040XP", "not available in US3 finish", "only for 1-3/4\" doors")

    5. PARAMETER STRUCTURE:
       - Group related options logically using domain knowledge
       - Use parent_parameter for hierarchical options (e.g., "Keyway" depends on "Cylinder Type")
       - is_numeric=true for dimensional options

    6. FIELD USAGE:
       - "description": Use domain-relevant descriptions when hardware jargon needs clarification. Use null for self-explanatory names.
       - "notes": ALWAYS include pricing info. Also include dependencies, compatibility constraints, and construction requirements when present in the PDF.
       - "is_numeric": TRUE for dimensional options, FALSE for fixed options

    JSON FORMATTING:
    - ALL strings in double quotes
    - NO trailing commas
    - Return ONLY valid JSON array

    OUTPUT FORMAT:
    [
        {{
            "parameter_name": "Cylinder Type",
            "description": null,
            "parent_parameter": null,
            "is_numeric": false,
            "options": [
                {{"option_name": "Standard Cylinder", "notes": "Included"}},
                {{"option_name": "SFIC", "notes": "+$25"}},
                {{"option_name": "Schlage C Keyway", "notes": "+$15"}}
            ]
        }}
    ]

hardware_optional_parameter_verification:
  description: "Verify extracted hardware optional parameters"
  prompt: |
    You are verifying optional parameter extraction for the "{series_name}" hardware series.

