    - "notes": include pricing and restrictions where available

    Return ONLY valid JSON array.

hardware_optional_parameter_extraction_concise:
  description: "Concise hardware optional parameter extraction for truncated responses"
  prompt: |
    IMPORTANT: Previous extraction was TRUNCATED. Provide CONDENSED response.

    TASK: Extract the MOST IMPORTANT optional parameters for "{series_name}" hardware.

    SERIES INFO:
