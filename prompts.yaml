price_extraction:
  description: "Extract all pricing data from series pages — base price grid and optional add-on prices"
  prompt: |
    You are an expert at analyzing door, frame, and hardware product pricebooks to extract ALL pricing information.

    TASK: Analyze the "{series_name}" series from the provided PDF to extract a COMPLETE, STRUCTURED pricing dataset.
    You will receive BOTH the base parameters and optional parameters already extracted for this series.
    Your job is to find and attach the correct prices to each.

    SERIES INFORMATION:
    - Series Name: {series_name}
    - Pages included in PDF: {series_pages}
    - Summary: {series_summary}
    - Category: {category}

    {additional_context}

    ALREADY EXTRACTED BASE PARAMETERS:
    {base_parameters}

    ALREADY EXTRACTED OPTIONAL PARAMETERS:
    {optional_parameters}

    EXTRACTION RULES:

    1. BASE PRICE TABLE — USE GRID FORMAT:
       - Find the base price table/grid for "{series_name}" in the PDF
       - The PDF table is typically a 2D grid (e.g., Height rows × Width columns), possibly grouped by Configuration, Jamb Depth, etc.
       - Mirror the PDF layout: output ONE grid object per distinct sub-table (e.g., per Configuration+JambDepth combo)
       - Each grid has "group" (the fixed parameter values), "row_param" / "col_param" (the two grid dimensions), "columns" (column header values), and "rows" (each row with its prices array aligned to columns)
       - Use the EXACT parameter names from the base parameters list above
       - If the table is very large, the grid format handles it efficiently — extract ALL rows and columns
       - If multiple tables exist (e.g., per configuration or per gauge), output a separate grid for EACH

    2. BASE PARAMETER UPCHARGES:
       - Some base parameter options have upcharges (e.g., 14ga costs $50 more than 18ga)
       - Extract these as separate entries in the "base_parameter_upcharges" section
       - Only include options that have a NON-ZERO price delta

    3. OPTIONAL PARAMETER PRICES:
       - For each optional parameter, find the add-on price from the PDF
       - Prices typically appear as "+$X", "add $X", or in a separate price column
       - If pricing is per-unit (per frame, per leaf, per prep), note the unit
       - Match each price to the correct option from the optional parameters list above

    4. ACCURACY:
       - Use EXACT dollar values from the PDF — do NOT estimate or interpolate
       - If a price is unclear or unreadable, set price to null and add a note
       - Cross-reference prices against the series summary for sanity checking

    JSON FORMATTING - CRITICAL:
    - ALL strings in double quotes
    - NO trailing commas
    - Escape special chars: \" for quotes
    - Return ONLY valid JSON object
    - Complete all JSON structures properly

    OUTPUT FORMAT:

    {{
        "series_name": "{series_name}",
        "base_price_table": [
            {{
                "group": "Configuration:Single | Jamb Depth:4-3/4",
                "row_param": "Height",
                "col_param": "Width",
                "columns": ["2-0", "2-4", "2-6", "2-8", "3-0"],
                "rows": [
                    {{"value": "6-8", "prices": [118.00, 122.00, 128.00, 134.00, 140.00]}},
                    {{"value": "7-0", "prices": [125.00, 129.00, 135.00, 141.00, 147.00]}}
                ],
                "notes": null
            }},
            {{
                "group": "Configuration:Pair | Jamb Depth:5-3/4",
                "row_param": "Height",
                "col_param": "Width",
                "columns": ["4-0", "5-0", "6-0"],
                "rows": [
                    {{"value": "7-0", "prices": [380.00, 410.00, 445.00]}},
                    {{"value": "8-0", "prices": [420.00, 455.00, 490.00]}}
                ],
                "notes": null
            }}
        ],
        "base_parameter_upcharges": [
            {{
                "parameter_name": "Gauge",
                "option_name": "14ga",
                "price": 50.00,
                "notes": "upcharge over standard 18ga"
            }}
        ],
        "optional_parameter_prices": [
            {{
                "parameter_name": "Vision Lite",
                "option_name": "Half Lite",
                "price": 125.00,
                "unit": null,
                "notes": null
            }},
            {{
                "parameter_name": "Silencer",
                "option_name": "Rubber Silencer",
                "price": 2.50,
                "unit": "per frame",
                "notes": null
            }}
        ]
    }}

price_verification:
  description: "Verify extracted pricing data for completeness and accuracy"
  prompt: |
    You are verifying price extraction for the "{series_name}" series.

    SERIES PAGES: {series_pages}
    CATEGORY: {category}
    SERIES SUMMARY: {series_summary}

    EXTRACTED PRICING DATA:
    {extracted_prices}

    ALREADY EXTRACTED BASE PARAMETERS:
    {base_parameters}

    ALREADY EXTRACTED OPTIONAL PARAMETERS:
    {optional_parameters}

    TASK: Verify extracted pricing against the ACTUAL PDF pages for "{series_name}".

    CHECK FOR:
