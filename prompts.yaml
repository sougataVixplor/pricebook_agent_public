# Prompts for AI Agents
# All prompts are centralized here

# ============================================
# Series Extraction Agent Prompts
# ============================================

series_extraction:
  description: "Main prompt for extracting series from door and frame PDF pricebooks"
  prompt: |
    You are an expert AI agent specialized in analyzing door and frame product catalogues and pricebooks.

    TASK: Analyze the provided PDF document and extract ALL series information.

    IMPORTANT RULES FOR SERIES EXTRACTION WHICH STRICTLY APPLY TO DOOR AND FRAME PRODUCTS:
    1. Scan the ENTIRE document - series information may be scattered across non-contiguous pages
    2. Do NOT classify individual options, parts, or accessories as separate series
    3. Focus on DOOR and FRAME product series/lines only
    4. Focus on extracting SERIES and PAGES ONLY - summaries will be extracted separately
    5. Group related information - if a series spans multiple pages, capture ALL page numbers
    6. Ensure ALL JSON strings are properly closed with quotes - no unterminated strings

    EXCLUDE THE FOLLOWING — these are NOT series:
    - Parts pages (replacement parts, spare parts lists, part numbers)
    - Accessories pages (door accessories, hardware accessories, closers, hinges, locks, sweeps, seals, thresholds, weatherstripping)
    - Optional add-ons, upgrades, or optional features sections
    - Price adders, surcharges, or adjustment tables
    - Finish/color option pages that are not tied to a specific series
    - General terms, conditions, warranty, or index pages
    - Freight, shipping, or packaging information
    - Hardware items: hinges, pivots, closers, locks, exit devices, pulls, push/pull bars, kickplates, door stops, holders
    - Glazing / glass / vision lite kits sold separately
    - Louvers, grilles, or ventilation components sold separately
    - Anchoring / installation accessories (anchors, clips, shims)
    - Sealants, caulking, or gasket products
    - Any page titled or headed with words like "Parts", "Accessories", "Options", "Add-Ons", "Adders", "Extras", "Miscellaneous", "Hardware", "Preparations"

    HOW TO TELL A REAL SERIES FROM ACCESSORIES:
    - A real DOOR series has its OWN base-price table keyed by door dimensions (width × height × gauge).
    - A real FRAME series has its OWN base-price table keyed by frame dimensions (width × height × jamb depth).
    - If a page only lists ADD-ON prices, up-charges, preps, or per-unit hardware costs — it is NOT a series.
    - If a page is a continuation of options/accessories for another series, attach those pages to the parent series instead.

    If a page only contains parts, accessories, or options for an existing series, do NOT create a new series for it — those details belong to the parent series.

    NOTE: Do NOT spend time on summaries - set SUMMARY to empty string.
    Summaries will be extracted in a dedicated step after categorization.

    {additional_rules}

    CRITICAL: Return ONLY valid, well-formed JSON. Every string must be properly quoted and closed.

    [
        {{
            "SERIES": "Exact series name as shown in document",
            "PAGES": [1, 2, 3],
            "SUMMARY": ""
        }}
    ]

# ============================================
# Verification and Refinement
# ============================================

series_categorization:
  description: "Categorize a single series as DOOR or FRAME using PDF content and assign raw material code"
  prompt: |
    You are an expert at categorizing door and frame products.

    TASK: Analyze the following series and determine if it is a DOOR or FRAME series, and assign the most appropriate raw material code.

    SERIES INFORMATION:
    - Name: {series_name}
    - Summary: {series_summary}
    - Pages in PDF: {series_pages}

    You have access to the ORIGINAL PDF document to verify the categorization.

    CATEGORIZATION CRITERIA:
    
    DOOR Series - Products that are primarily doors:
    - Door units, door slabs, door leaves
    - Door configurations (single, double, vision lites)
    - Door types (flush, panel, hollow metal)
    - Entrance systems focused on the door component
    - Products priced by door size/configuration
    
    FRAME Series - Products that are primarily frames:
    - Frame profiles, frame assemblies
    - Jambs, headers, sills
    - Frame configurations (masonry, drywall, etc.)
    - Rabbet depths, frame gauges
    - Products priced by opening size/frame type
    - Knock-down (KD) or welded frames
    - Borrowed lite frames, sidelight frames, transom frames

    AVAILABLE RAW MATERIAL CODES:
    {raw_materials}

    RAW MATERIAL ASSIGNMENT RULES:
    - Pick the code that best matches the product's PRIMARY material and type (door vs frame)
    - For hollow metal doors → HMD, hollow metal frames → HMF
    - For wood doors → WDD, wood frames → WDF
    - For stainless steel doors → SSD, stainless steel frames → SSF
    - For sound-rated / STC doors → STD, sound-rated frames → STF
    - For blast-resistant doors → BD, blast-resistant frames → BF
    - If unsure, pick the closest match based on material and product type

    ANALYSIS STEPS:
    1. Review the series name - analyze the meaning of the name
    2. Review the summary - understand what the product IS
    3. Check the PDF pages listed - see the actual product specifications
    4. Look at pricing structure - size-based vs model/function-based
    5. If mixed (door+frame assembly), determine PRIMARY focus
    6. Determine the primary material (hollow metal, wood, stainless steel, etc.)
    7. Assign the matching raw material code

    {additional_rules}

    Return ONLY valid JSON in exactly this format (no markdown, no extra text):
    {{"CATEGORY": "DOOR", "RAW_MATERIAL_CODE": "HMD", "CONFIDENCE": 0.95, "REASONING": "explanation here"}}
    
    or
    
    {{"CATEGORY": "FRAME", "RAW_MATERIAL_CODE": "HMF", "CONFIDENCE": 0.95, "REASONING": "explanation here"}}

# ============================================
# Summary Extraction Prompts (runs after categorization)
# ============================================

summary_extraction:
  description: "Extract detailed summary for a DOOR or FRAME series (no hardware)"
  prompt: |
    You are an expert at analyzing door and frame product pricebooks.

    TASK: Create an EXTREMELY DETAILED and COMPREHENSIVE summary for the "{series_name}" series.
    This is a {category} series. The PDF contains ONLY the relevant pages for this series.

    SERIES INFORMATION:
    - Series Name: {series_name}
    - Category: {category}
    - Pages: {series_pages}

    {additional_context}

    CRITICAL: CAPTURE EVERY DETAIL - NO INFORMATION SHOULD BE LEFT OUT!
    
    SUMMARY REQUIREMENTS - Be EXHAUSTIVE and COMPREHENSIVE (1500-2000 characters):
    Include EVERY piece of information found in the document, including ALL small details.

    Include ALL of the following sections that apply:

    1. PRODUCT IDENTITY & CONSTRUCTION:
       - Exact product type and full name/designation
       - Primary material(s) with specific grades or types (e.g., "16-gauge cold-rolled steel")
       - Construction method (welded, bonded, composite, laminated, etc.)
       - Core type and composition (honeycomb, polystyrene, mineral, etc.)
       - Edge construction details (seamless, visible seam, welded corners)
       - Manufacturing process notes

    2. SPECIFICATIONS & RATINGS:
       - ALL available gauges with specific thickness measurements
       - Fire ratings (20-min, 45-min, 60-min, 90-min, 3-hr) with testing standards
       - Sound ratings (STC ratings) if mentioned
       - Wind load ratings or hurricane certifications
       - Security ratings or levels
       - Thermal performance (U-factor, R-value)
       - Environmental certifications (LEED, FSC, etc.)

    3. CONFIGURATIONS & SIZES:
       - ALL available configurations (single, pair, double-egress, etc.)
       - Complete size ranges: minimum and maximum widths (exact measurements)
       - Complete height ranges: minimum and maximum heights (exact measurements)
       - Standard vs custom size availability
       - Thickness options with exact measurements
       - Swing directions available
       - Special size limitations or requirements
       - For FRAMES: profile types, rabbet depths, jamb depths, throat dimensions

    4. BASE PRICE STRUCTURE:
       - Exact parameters that determine base price (size, gauge, type, etc.)
       - Price table structure and organization
       - How pricing varies by dimension ranges
       - Standard vs premium pricing tiers
       - Volume discount structures if mentioned
       - Lead time impacts on pricing

    5. STANDARD FEATURES (Included in base):
       - Hardware preparations included (hinge count, locations, sizes)
       - Lock/latch preparations (mortise, cylindrical, etc.)
       - Reinforcement plates or channels included
       - Edge seals or weatherstripping included
       - Factory priming or finish included
       - Label options included (fire, accessibility, etc.)
       - Warranty details
       - For FRAMES: anchor types included, silencers, dust cover strike

    6. AVAILABLE OPTIONS & ADD-ONS:
       - Vision lite options: ALL types (full, half, narrow), ALL sizes available
       - Louver options: types, sizes, locations, grille patterns
       - Glass types available (wire, tempered, laminated, etc.)
       - Finish options: ALL colors, textures, coatings available
       - Special preps: continuous hinge, power transfer, closer reinforcement, etc.
       - Cutouts and custom modifications available
       - Special seals (smoke, acoustic, light)
       - For FRAMES: borrowed lite, sidelight, transom, spreader bars

    7. PRICING IMPACTS & UPCHARGES:
       - Specific upcharges for each option category ("+$X for...")
       - Size-based pricing adjustments ("sizes over X add $Y")
       - Gauge upgrades cost impact
       - Fire rating pricing impacts
       - Custom size premium percentages
       - Rush order surcharges
       - Freight/shipping considerations

    8. DEPENDENCIES & RESTRICTIONS:
       - Parameter interdependencies (e.g., "fire rating limits available gauges")
       - Size limitations by gauge or rating
       - Configuration restrictions (e.g., "pairs not available over X width")
       - Material combinations that are not allowed
       - Building code compliance requirements
       - Maximum weight limitations

    9. TECHNICAL NOTES:
       - Installation requirements or recommendations
       - Field modifications allowed/not allowed
       - Warranty conditions or exclusions
       - Testing/certification details

    10. AVAILABILITY & LEAD TIMES:
        - Standard lead time
        - Quick ship options if available
        - Custom order lead times
        - Stock vs made-to-order items

    FORMATTING REQUIREMENTS:
    - Use clear paragraph breaks for different sections
    - Be specific with measurements, codes, and model numbers
    - Include actual values, not ranges (e.g., "3'-0\" to 10'-0\"" not "various sizes")
    - Mention specific page numbers if referencing different price tables
    - Use technical terminology correctly
    - DO NOT omit details to save space - include EVERYTHING

    The summary should enable someone to:
    1. Understand EXACTLY what this product is
    2. Know ALL available options and configurations
    3. Understand complete pricing structure and impacts
    4. Identify ALL dependencies and restrictions
    5. Make informed ordering decisions without referring back to the PDF

    Return ONLY valid JSON:
    {{"summary": "Your extremely detailed and comprehensive summary here capturing every detail from the document..."}}

series_refinement:
  description: "Refine series extraction based on PDF verification feedback"
  prompt: |
    You previously extracted series information from a PDF. Now you have verification feedback from a secondary PDF analysis.

    ORIGINAL EXTRACTION:
    {original_extraction}

    PDF VERIFICATION RESULTS:
    {verification_results}

    {additional_rules}

    TASK: Refine the extraction based on the PDF verification feedback.

    VERIFICATION APPROACH:
    1. PDF Content is the single source of truth
    2. Cross-check extracted series names against the actual PDF pages
    3. Verify page numbers are accurate for each series

    Rules:
    1. If verification shows low confidence (<0.3), re-check the PDF to confirm accuracy
    2. Keep series that are clearly visible in the PDF
    3. Fix any series names that don't match what's actually in the PDF
    4. Correct page numbers if they were incorrect
    5. Apply any corrections suggested by the verification
    6. Never remove series that clearly exist in the PDF
    7. Do NOT categorize as DOOR or FRAME - categorization is done separately
    8. Return only SERIES, PAGES, SUMMARY, and VERIFICATION fields

    Return the refined extraction as a JSON array (no markdown formatting):
    [
        {{
            "SERIES": "Corrected series name from PDF",
            "PAGES": [corrected page numbers],
            "SUMMARY": "Accurate summary based on PDF content",
            "VERIFICATION": {{
                "verified": true,
                "confidence": 0.85,
                "page_verified": true,
                "corrections": null
            }}
        }}
    ]


# ============================================
# Parameter Extraction Prompts
# ============================================

parameter_extraction:
  description: "Extract configuration parameters from door/frame series base price table"
  prompt: |
    You are an expert in commercial door, frame, and hollow metal construction and manufacturing.
    You deeply understand how pricebooks are structured — base price grids are organized by dimensions (Height × Width), grouped by configuration type (Single, Pair, etc.), jamb depth, gauge, profile, and other construction attributes. You know that each of these groupings represents a PRICE-AFFECTING selection.

    TASK: Analyze the "{series_name}" series from the provided PDF (ONLY these pages are included) to extract ONLY the MINIMUM parameters required to look up a single cell in the BASE PRICE TABLE.

    SERIES INFORMATION:
    - Series Name: {series_name}
    - Pages included in PDF: {series_pages}
    - Summary: {series_summary}

    {additional_context}

    EXTRACTION RULES:

    1. BASE PRICE TABLE IDENTIFICATION:
       - Find the SPECIFIC base price table for "{series_name}"
       - Tables are labeled with series name, model numbers, or part numbers
       - Look for price grids with dimensions (Width x Height)
       - Look for columns organized by jamb depth, gauge, or frame type
       - IGNORE tables for other series that may be on these pages

    2. EXTRACT EXACT VALUES FROM TABLE:
       
       CRITICAL: Extract ONLY the values that ACTUALLY appear in the table.
       
       - Width: Extract the EXACT width values shown in the table rows/columns
       - Height: Extract the EXACT height values shown in the table rows/columns  
       - Jamb Depth: Extract the EXACT jamb depths from column headers
       - Gauge: Extract from table title or header (e.g., "16ga", "18ga")
       - Type/Configuration: Extract from table (e.g., "Single", "Pair", "DE-FD-16-4")
       - Profile: Frame profile types if applicable
       - Rabbet: Rabbet depth options if applicable
       
       DO NOT:
       - Assume standard values that aren't shown
       - Mix values from different tables/series
       - Add options that don't appear in THIS series' table
       
       INCLUDE — ONLY parameters that are axes or groupings of the base price table:
       - Row headers of the price grid (e.g., Height)
       - Column headers of the price grid (e.g., Width)
       - Table grouping/splitting parameters (e.g., Configuration, Jamb Depth, Gauge) — these create separate sub-tables
       - In short: the minimum set of selections needed to pinpoint ONE price cell in the base table
       
       EXCLUDE — everything else goes to optional parameters:
       - Upcharges, adders, and surcharges (even if near the base table)
       - Accessories, add-ons, and modifications
       - Any parameter NOT required to locate a base price cell
       
       For parameters with >10 options: include first 5 representative values only.

    3. PARAMETER HIERARCHY: 
       - Break combined parameters into parent/child relationships when appropriate
       - Set parent_parameter field for dependent parameters
       - As a domain expert, note dependencies — e.g., certain jamb depths may only apply to specific configurations

    4. FIELD USAGE:
       - "description": Use domain-relevant descriptions when the parameter name alone is ambiguous to a non-expert (e.g., "Throat size of the frame profile" for Jamb Depth). Use null for self-explanatory names like Width, Height, Gauge.
       - "notes": Capture pricing impacts, construction constraints, or dependencies (e.g., "+$50 upcharge", "only available with Single config", "determines base price tier"). Use null when there is no pricing note or constraint.
       - "is_numeric": Set to TRUE for dimensional parameters where user can enter ANY numeric value:
         * Width, Height, Thickness, Depth, Jamb Depth, Throat Dimension = TRUE (user can input custom sizes)
         * Gauge, Frame Type, Profile, Configuration = FALSE (fixed options only)
       - Keep responses concise to avoid truncation

    JSON FORMATTING - CRITICAL:
    - ALL strings in double quotes
    - NO trailing commas
    - Escape special chars: \" for quotes
    - Return ONLY valid JSON array
    - Complete all JSON structures properly

    OUTPUT FORMAT:

    [
        {{
            "parameter_name": "Gauge",
            "description": null,
            "parent_parameter": null,
            "is_numeric": false,
            "options": [
                {{\"option_name\": \"18ga\", \"notes\": null}},
                {{\"option_name\": \"16ga\", \"notes\": null}},
                {{\"option_name\": \"14ga\", \"notes\": "+$50 upcharge"}}
            ]
        }},
        {{
            "parameter_name": "Width",
            "description": null,
            "parent_parameter": null,
            "is_numeric": true,
            "options": [
                {{\"option_name\": \"3-0\", \"notes\": null}},
                {{\"option_name\": \"4-0\", \"notes\": null}},
                {{\"option_name\": \"6-0\", \"notes\": null}}
            ]
        }}
    ]

parameter_verification:
  description: "Verify and analyze extracted parameters for completeness"
  prompt: |
    You are verifying parameter extraction for the "{series_name}" series.

    SERIES PAGES: {series_pages}

    EXTRACTED PARAMETERS:
    {extracted_parameters}

    TASK: Verify extracted parameters against the SPECIFIC base price table for "{series_name}".

    CHECK FOR:
    1. Missing key parameters from the base price table
    2. INCORRECT OPTIONS: Width/Height/Jamb Depth values that don't match the table
    3. Parameters that need parent/child hierarchy
    4. Values from OTHER series' tables mixed in (should only have THIS series' values)

    VERIFY DIMENSIONS:
    - Check Width options against the actual table row headers
    - Check Height options against the actual table row headers  
    - Check Jamb Depth options against the actual table column headers
    - Flag if generic values were used instead of actual table values

    KEEP RESPONSE SHORT:
    - Max 3 issues
    - Brief descriptions (50 chars max)
    - List only parameter names

    Return JSON:
    {{
        "is_complete": true,
        "issues_count": 0,
        "issues": [{{"type": "missing_parameter", "description": "Brief"}}],
        "missing_parameters": ["Param1"]
    }}

parameter_refinement:
  description: "Refine parameters based on verification feedback"
  prompt: |
    You are refining parameter extraction for the "{series_name}" series based on feedback.

    SERIES PAGES: {series_pages}

    CURRENT PARAMETERS:
    {current_parameters}

    VERIFICATION FEEDBACK:
    {feedback}

    TASK: Refine the parameters based on the feedback:
    - Add missing parameters from the base price table
    - Fix hierarchy issues (parent/child relationships)
    - CORRECT any dimension options (Width/Height/Jamb Depth) to match EXACT values in the table
    - Remove options that don't exist in THIS series' table

    CRITICAL: Extract ONLY values from the "{series_name}" base price table:
    - Width: Use EXACT values from table rows (e.g., if table shows 6'0", 8'0", 9'10" - use ONLY those)
    - Height: Use EXACT values from table rows
    - Jamb Depth: Use EXACT values from table column headers
    - DO NOT use generic/standard values that aren't in this specific table

    MINIMIZE TOKEN USAGE - CRITICAL:
    - "description": Use ONLY if parameter needs explanation, else null
    - "notes": Use ONLY if option has special pricing/restriction, else null
    - Most values should be null

    JSON FORMATTING:
    - Double quotes for strings
    - NO trailing commas
    - Return ONLY valid JSON

    OUTPUT FORMAT:
    
    [
        {{
            "parameter_name": "Parameter Name",
            "description": null,
            "parent_parameter": null,
            "is_numeric": false,
            "options": [
                {{"option_name": "Option 1", "notes": null}},
                {{"option_name": "Option 2", "notes": "+$25 upcharge"}}
            ]
        }},
        {{
            "parameter_name": "Width",
            "description": null,
            "parent_parameter": null,
            "is_numeric": true,
            "options": [
                {{"option_name": "6'0\"", "notes": null}},
                {{"option_name": "8'0\"", "notes": null}}
            ]
        }}
    ]

parameter_extraction_concise:
  description: "Extract parameters with strict limits when previous response was truncated"
  prompt: |
    You are an expert at analyzing door and frame product pricebooks to extract configuration parameters.

    IMPORTANT: The previous extraction attempt was TRUNCATED due to response length limits.
    You MUST provide a CONDENSED response that fits within output limits.

    TASK: Extract ONLY the ESSENTIAL parameters for "{series_name}" series from the PDF.

    SERIES INFORMATION:
    - Series Name: {series_name}
    - Pages: {series_pages}
    - Summary: {series_summary}

    STRICT CONDENSATION RULES:

    1. LIMIT PARAMETERS: Extract maximum 8 most important parameters only:
       Width, Height, Jamb Depth, Gauge, Frame Type/Configuration, 2-3 others

    2. LIMIT OPTIONS PER PARAMETER:
       - For dimensions: Show first 3 and last 2 values with "..." notation
       - For other parameters: Maximum 5 options
       - Example: ["3-0", "3-4", "3-6", "...", "8-0", "10-0"]

    3. MINIMIZE TEXT:
       - "description": ALWAYS null
       - "notes": ALWAYS null (no notes!)
       - Keep option_name values short

    4. JSON MUST BE COMPLETE - No truncation!

    OUTPUT FORMAT (STRICT):

    [
        {{
            "parameter_name": "Gauge",
            "description": null,
            "parent_parameter": null,
            "is_numeric": false,
            "options": [
                {{"option_name": "18ga", "notes": null}},
                {{"option_name": "16ga", "notes": null}}
            ]
        }},
        {{
            "parameter_name": "Width",
            "description": null,
            "parent_parameter": null,
            "is_numeric": true,
            "options": [
                {{"option_name": "3-0", "notes": null}},
                {{"option_name": "4-0", "notes": null}},
                {{"option_name": "...", "notes": null}},
                {{"option_name": "8-0", "notes": null}}
            ]
        }}
    ]

    Return ONLY the JSON array. Ensure it is COMPLETE and valid.

# ============================================
# Optional Parameter Extraction Prompts
# ============================================

optional_parameter_extraction:
  description: "Extract optional/add-on parameters from door/frame series pages"
  prompt: |
    You are an expert in commercial door, frame, and hollow metal construction and manufacturing.
    You understand the full scope of optional add-ons, preps, accessories, and modifications available for hollow metal doors and frames — and you know which ones carry pricing in a pricebook. Your job is to capture EVERY option that has a price attached to it (directly or indirectly).

    TASK: Analyze the "{series_name}" series from the provided PDF to extract ALL OPTIONAL parameters that have associated PRICING — accessories, add-ons, preps, modifications, upcharges, and upgrades that are NOT part of the base price but DO carry an additional cost.

    SERIES INFORMATION:
    - Series Name: {series_name}
    - Pages included in PDF: {series_pages}
    - Summary: {series_summary}
    - Category: {category}

    {additional_context}

    ALREADY EXTRACTED BASE PARAMETERS (DO NOT INCLUDE THESE):
    {base_parameter_names}
    These parameters are already captured as base price table axes/groupings. Do NOT duplicate them in optional parameters.
    However, if a base parameter has UPCHARGE options (e.g., "14ga add $50 over 18ga"), those upcharges SHOULD be captured here.

    EXTRACTION RULES:

    1. PRICE-DRIVEN EXTRACTION — CRITICAL PRINCIPLE:
       - ONLY extract parameters/options that have pricing shown in the PDF ("+$X", "add $X", price column, price table)
       - If an item appears in the PDF with NO associated price, SKIP it — it's informational only
       - Every option you extract should have a price note or be part of a priced group

    2. OPTIONAL ITEMS IDENTIFICATION:
       Look for sections labeled:
       - "Options", "Accessories", "Add-ons", "Upgrades"
       - "Optional Features", "Adders", "Upcharges"
       - Separate price lists for modifications
       - Items with "add $X" or "+$X" pricing

    3. WHAT TO EXTRACT (domain knowledge — common priced options):

       For DOOR series:
       - Vision lites/glass options and sizes (lite kits, glazing types)
       - Louvers (types, sizes, locations — blade type affects price)
       - Special coatings/finishes (galvanized, powder coat, custom colors)
       - Security features (reinforcements, security mesh, bullet-resistant panels)
       - Fire rating upgrades (when higher rating has an adder)
       - Acoustic ratings/seals (STC-rated assemblies)
       - Weatherstripping options (types: compression, magnetic, interlocking)
       - Astragals for pairs (overlapping, flush, T-astragal)
       - Cutouts and preparations (hinge prep, lock prep, closer prep)
       - Label/certification options (when add-on pricing exists)
       - Edge treatments (beveled, rounded, square)
       - Door bottom types (sweep, automatic door bottom)

       For FRAME series:
       - Anchor types and quantities (masonry, T-strap, core board, adjustable)
       - Silencers (rubber, lead-lined)
       - Dust cover/strike box options
       - Continuous hinge prep (full-length routing)
       - Power transfer prep (electrified hardware accommodation)
       - Closer reinforcement (14ga or 12ga plates)
       - Surface-applied hardware prep (exit device, surface closer)
       - Spreader bars (temporary or welded)
       - Wrap-around frames / drywall frames
       - Borrowed lite frames (vision panel in wall)
       - Sidelight/transom options
       - Jamb prep for specific hardware (electric strike, magnetic lock)
       - Head/jamb stiffeners

    4. EXTRACT EXACT VALUES WITH PRICING:
       - Get EXACT option names as shown in the PDF
       - ALWAYS include pricing in notes ("+$50", "add $12/prep", "$8.50 each")
       - Note size/dimension constraints that affect pricing
       - Capture compatibility and dependency requirements (e.g., "requires pair configuration", "not available with fire-rated", "only for 16ga or heavier")

    5. PARAMETER STRUCTURE:
       - Group related options under logical parameter names using domain knowledge
       - Use parent_parameter for hierarchical options (e.g., "Lite Size" depends on "Vision Lite")
       - Set is_numeric=true for dimensional options (lite sizes, cutout dimensions)

    6. FIELD USAGE:
       - "description": Use domain-relevant descriptions when the option name is industry jargon (e.g., "Steel channel welded to jamb for door alignment" for Spreader Bar). Use null for self-explanatory names.
       - "notes": ALWAYS include pricing info. Also include dependencies, size restrictions, or compatibility notes when present in the PDF.
       - "is_numeric": TRUE for size/dimension inputs, FALSE for fixed options

    JSON FORMATTING - CRITICAL:
    - ALL strings in double quotes
    - NO trailing commas
    - Escape special chars: \" for quotes
    - Return ONLY valid JSON array
    - Complete all JSON structures properly

    OUTPUT FORMAT:

    [
        {{
            "parameter_name": "Vision Lite",
            "description": "Glass panel options",
            "parent_parameter": null,
            "is_numeric": false,
            "options": [
                {{"option_name": "No Lite", "notes": "Standard"}},
                {{"option_name": "Half Lite", "notes": "+$125"}},
                {{"option_name": "Full Lite", "notes": "+$200"}},
                {{"option_name": "Narrow Lite", "notes": "+$95"}}
            ]
        }},
        {{
            "parameter_name": "Lite Size",
            "description": null,
            "parent_parameter": "Vision Lite",
            "is_numeric": true,
            "options": [
                {{"option_name": "6x24", "notes": null}},
                {{"option_name": "12x12", "notes": null}},
                {{"option_name": "24x24", "notes": "+$15 over standard"}}
            ]
        }},
        {{
            "parameter_name": "Hinge Prep",
            "description": "Hinge preparation type",
            "parent_parameter": null,
            "is_numeric": false,
            "options": [
