    STRICT RULES:
    1. Maximum 10 parameters: Cylinder, Trim, Keying, Electrical, Finish Upgrade, Dogging, Mounting Kit, Cover Plate, etc.
    2. Maximum 5 options per parameter
    3. "description": ALWAYS null
    4. "notes": Only if pricing available
    5. JSON MUST BE COMPLETE

    Return ONLY valid JSON array.

hardware_parameter_extraction_concise:
