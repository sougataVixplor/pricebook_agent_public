    - Summary: {series_summary}
    - Category: {category}

    BASE PARAMETERS:
    {base_parameters}

    OPTIONAL PARAMETERS:
    {optional_parameters}

    USE GRID FORMAT — this is much more compact than flat entries:
    - One grid object per sub-table (e.g., per Configuration+JambDepth combo)
    - "columns" = column header values, "rows" = row entries with aligned price arrays
    - This naturally captures the same 2D grid layout as the PDF

    CONDENSATION RULES (only if grid is still too large):
    1. Cover ALL sub-tables (configurations/jamb depths) — do NOT skip any
    2. Include ALL rows and columns from each sub-table
