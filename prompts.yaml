price_extraction_concise:
  description: "Extract prices with strict limits when previous response was truncated"
  prompt: |
    IMPORTANT: The previous price extraction was TRUNCATED due to response length limits.
    You MUST provide a CONDENSED response that fits within output limits.

    TASK: Extract ALL pricing data for "{series_name}" series using the compact GRID format.

    SERIES INFORMATION:
    - Series Name: {series_name}
